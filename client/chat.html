<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <script src="https://cdnjs.cloudflare.com" crossorigin="anonymous"></script>

  <!-- Socket.IO -->
  <script src="https://chat-app-backend-spb6.onrender.com/socket.io/socket.io.js"></script>

  <style>
    :root {
      --bg-light: #f4f6fb;
      --bg-white: #ffffff;
      --primary: #5b6cff;
      --secondary: #edf0ff;
      --text-dark: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;

      --bg-dark: #0b0f1a;
      --glass: rgba(255, 255, 255, 0.08);
      --text-light: #e5e7eb;
      --border-dark: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      font-family: "Inter", sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg-light);
      height: 100dvh;
      overflow: hidden;
      transition: background 0.3s ease;
      padding-top: env(safe-area-inset-top);
    }

    body.dark {
      background: linear-gradient(135deg, #0b0f1a, #1a1f36);
    }

    .app {
      display: flex;
      height: 100%;
      max-width: 1200px;
      margin: auto;
      background: var(--bg-white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      transition: background 0.3s ease;
    }

    body.dark .app {
      background: transparent;
      backdrop-filter: blur(18px);
      border: 1px solid var(--border-dark);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: var(--bg-white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: background 0.3s ease;
    }

    body.dark .sidebar {
      background: var(--glass);
      border-right: 1px solid var(--border-dark);
    }

    .sidebar-header {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-dark);
    }

    body.dark .sidebar-header h2 {
      color: var(--text-light);
    }

    .settings-btn {
      background: var(--secondary);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      color: var(--primary);
      font-size: 16px;
      transition: background 0.2s ease;
    }

    body.dark .settings-btn {
      background: rgba(255,255,255,0.15);
      color: var(--text-light);
    }

    .settings-btn:hover {
      background: var(--primary);
      color: white;
    }

    .search-box {
      padding: 0 16px 12px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      outline: none;
      font-size: 14px;
      background: #f9fafb;
      transition: all 0.2s ease;
    }

    body.dark .search-box input {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--border-dark);
      color: var(--text-light);
    }

    .search-box input:focus {
      border-color: var(--primary);
      background: white;
    }

    body.dark .search-box input:focus {
      background: rgba(255,255,255,0.15);
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      padding: 12px;
      margin: 4px 8px;
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .chat-item:hover {
      background: var(--secondary);
    }

    body.dark .chat-item:hover {
      background: rgba(255,255,255,0.12);
    }

    .chat-item.active {
      background: var(--primary);
      color: white;
    }

    .chat-item.active .chat-name,
    .chat-item.active .chat-preview {
      color: white;
    }

    .chat-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--primary);
      margin-right: 12px;
      flex-shrink: 0;
    }

    .chat-details {
      flex: 1;
      min-width: 0;
    }

    .chat-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    body.dark .chat-name {
      color: var(--text-light);
    }

    .chat-preview {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    body.dark .chat-preview {
      color: #9ca3af;
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f9fafb;
      transition: background 0.3s ease;
    }

    body.dark .chat-area {
      background: transparent;
    }

    .chat-header {
      height: 64px;
      background: var(--bg-white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      transition: background 0.3s ease;
    }

    body.dark .chat-header {
      background: var(--glass);
      border-bottom: 1px solid var(--border-dark);
    }

    .chat-header .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--primary);
    }

    .chat-header .chat-title {
      display: flex;
      flex-direction: column;
    }

    .chat-header .name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
    }

    body.dark .chat-header .name {
      color: var(--text-light);
    }

    .chat-header .status {
      font-size: 12px;
      color: var(--text-muted);
    }

    body.dark .chat-header .status {
      color: #9ca3af;
    }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.sent {
      align-self: flex-end;
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .message.received {
      align-self: flex-start;
      background: #ffffff;
      color: var(--text-dark);
      border-bottom-left-radius: 6px;
      border: 1px solid var(--border);
    }

    .message-time {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 4px;
      text-align: right;
    }

    .message.received .message-time {
      text-align: left;
    }

    body.dark .message.received {
      background: rgba(255,255,255,0.12);
      color: var(--text-light);
      border: 1px solid var(--border-dark);
    }

    /* Input Area */
    .chat-input {
      height: 70px;
      padding: 10px 14px;
      background: var(--bg-white);
      border-top: 1px solid var(--border);
      display: none; /* Hidden until chat selected */
      align-items: center;
      gap: 10px;
      transition: background 0.3s ease;
    }

    body.dark .chat-input {
      background: var(--glass);
      border-top: 1px solid var(--border-dark);
    }

    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      outline: none;
      font-size: 14px;
      background: #f9fafb;
      transition: all 0.2s ease;
    }

    body.dark .chat-input input {
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--border-dark);
      color: var(--text-light);
    }

    .chat-input input:focus {
      border-color: var(--primary);
      background: white;
    }

    body.dark .chat-input input:focus {
      background: rgba(255,255,255,0.18);
    }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .send-btn:hover {
      background: #4a5cf5;
      transform: translateY(-1px);
    }

    /* Empty State */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: var(--text-muted);
      text-align: center;
      padding: 24px;
    }

    body.dark .empty-state {
      color: #9ca3af;
    }

    .empty-state h3 {
      margin: 0 0 8px;
      font-weight: 600;
      color: var(--text-dark);
    }

    body.dark .empty-state h3 {
      color: var(--text-light);
    }

    .empty-state p {
      margin: 0;
      font-size: 14px;
    }

    /* Settings Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 20px;
      width: 90%;
      max-width: 320px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      transition: background 0.3s ease;
    }

    body.dark .modal-content {
      background: rgba(30, 35, 60, 0.9);
      backdrop-filter: blur(12px);
      color: var(--text-light);
    }

    .modal-content h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 16px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .setting-row span {
      font-size: 14px;
    }


    .typing-indicator {
      font-size: 12px;
      color: #6b7280;
      padding: 6px 10px;
      margin-top: 4px;
      animation: fadeIn 0.2s ease;
    }

    body.dark .typing-indicator {
      color: #9ca3af;
    }


    .theme-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 52px;
      height: 28px;
      padding: 4px;
      border-radius: 999px;
      background: var(--secondary);
      cursor: pointer;
      position: relative;
      transition: background 0.3s ease;
      border: none;
      outline: none;
      cursor: pointer;
    }

    .theme-toggle span {
      font-size: 14px;
      z-index: 2;
    }

    .theme-toggle::after {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      transition: transform 0.3s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .theme-toggle:focus {
      outline: none;
    }

    body.dark .theme-toggle {
      background: rgba(255,255,255,0.15);
    }

    body.dark .theme-toggle::after {
      transform: translateX(24px);
    }

    .chat-avatar {
      position: relative;
    }

    .profile-menu {
      position: relative;
    }

    .profile-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .dropdown {
      position: absolute;
      left: 45px;
      top: 0px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      display: none;
      flex-direction: column;
      min-width: 160px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.2s ease;
    }

    body.dark .dropdown {
      background: rgba(30,35,60,0.95);
    }

    .dropdown.show {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }

    .dropdown-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    .dropdown-item:hover {
      background: #f3f4f6;
    }

    body.dark .dropdown-item:hover {
      background: rgba(255,255,255,0.1);
    }

    body.dark .dropdown-item {
      color: var(--text-light);
    }

    body.dark .logout {
      color: red;
    }

    .logout {
      color: red;
    }
    
    .status-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 10px;
      height: 10px;
      background: gray;
      border-radius: 50%;
      border: 2px solid white;
    }

    .status-dot.online {
      background: #22c55e; /* green */
    }

    body.dark .status-dot {
      border: 2px solid #0b0f1a;
    }

    .toggle {
      width: 44px;
      height: 24px;
      background: #d1d5db;
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .toggle::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: transform 0.2s ease;
    }

    .toggle.active {
      background: var(--primary);
    }

    .toggle.active::after {
      transform: translateX(20px);
    }

    .message-meta {
      display: flex;
      gap: 6px;
      font-size: 10px;
      opacity: 0.7;
      margin-top: 4px;
      justify-content: flex-end;
    }

    .message.received .message-meta {
      justify-content: flex-start;
    }

    .status {
      font-weight: bold;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
      }

      .chat-area {
        display: none;
      }

      .app.mobile-chat .sidebar {
        display: none;
      }

      .app.mobile-chat .chat-area {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">

        <div class="profile-menu">
          <div class="profile-avatar" id="profileAvatar">U</div>
        
          <div class="dropdown" id="dropdown">
            <div class="dropdown-item" id="changeAvatar">Change Avatar</div>
            <div class="dropdown-item" id="removeAvatar">Remove Avatar</div>
            <div class="dropdown-item logout" id="logoutBtn">Logout</div>
          </div>
        </div>
        
        <input type="file" id="avatarInput" hidden accept="image/*" />


        <h2>Chats</h2>
        <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
          <span class="sun">☀️</span>
          <span class="moon">🌙</span>
        </button>
      </div>      

      <div class="search-box">
        <input type="text" placeholder="Search chats..." />
      </div>

      <div class="chat-list" id="chatList">
        <!-- Users will be injected here -->
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-header" id="chatHeader" style="display:none;">
        <div class="avatar" id="chatAvatar">U</div>
        <div class="chat-title">
          <div class="name" id="chatName">User</div>
          <div class="status" id="chatStatus">Online</div>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="empty-state" id="emptyState">
          <h3>Welcome 👋</h3>
          <p>Select a chat to start messaging</p>
        </div>
      </div>

      <div class="chat-input" id="chatInput">
        <input type="text" id="messageInput" placeholder="Type a message..." />
        <button class="send-btn" id="sendBtn">
          <i class="fa-solid fa-paper-plane">-></i>
        </button>
      </div>
    </div>
  </div>  

  <script>
    const socket = io("https://chat-app-backend-spb6.onrender.com");
  
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user"));

    if (!token || !user) {
      window.location.href = "login.html";
    }

    // Replace mock user with real one
    // const currentUser = {
    //   id: user.id,
    //   username: user.username
    // };
    const currentUser = JSON.parse(localStorage.getItem("user"));

    let typingTimeout;

    let users = [];

    async function fetchUsers() {
      try {
        const res = await fetch("https://chat-app-backend-spb6.onrender.com/api/users", {
          headers: {
            "Authorization": `Bearer ${token}`
          }
        });

        const data = await res.json();
        users = data.map(u => ({
          id: u._id,
          name: u.username,
          online: false // will update later
        }));

        renderUserList();
      } catch (err) {
        console.error("Failed to fetch users:", err);
      }
    }

  
    let selectedUser = null;
    const messages = {};
  
    const chatList = document.getElementById("chatList");
    const chatHeader = document.getElementById("chatHeader");
    const chatAvatar = document.getElementById("chatAvatar");
    const chatName = document.getElementById("chatName");
    const chatStatus = document.getElementById("chatStatus");
    const chatMessages = document.getElementById("chatMessages");
    const chatInput = document.getElementById("chatInput");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const emptyState = document.getElementById("emptyState");
    const app = document.getElementById("app");
    const themeToggle = document.getElementById("themeToggle");

    function init() {
      fetchUsers();
      setupEvents();
      loadTheme();
      loadProfile();
      socket.emit("join", currentUser.id);
    }

    function renderUserList() {
      chatList.innerHTML = "";
      users.forEach(user => {
        const item = document.createElement("div");
        item.className = "chat-item";
        item.innerHTML = `
          <div class="chat-avatar">
            ${
              user.avatar
                ? `<img src="https://chat-app-backend-spb6.onrender.com/uploads/${user.avatar}" />`
                : user.name.charAt(0)
            }
            <span class="status-dot ${user.online ? "online" : ""}"></span>
          </div>
          <div class="chat-details">
            <div class="chat-name">${user.name}</div>
            <div class="chat-preview">
              ${user.online ? "Online" : "Offline"}
            </div>
          </div>
        `;
        item.addEventListener("click", () => selectUser(user, item));
        chatList.appendChild(item);
      });
    }
  

    async function selectUser(user, element) {
    selectedUser = user;
    app.classList.add("mobile-chat");

    document.querySelectorAll(".chat-item").forEach(item => {
      item.classList.remove("active");
    });
    element.classList.add("active");

    chatHeader.style.display = "flex";
    chatAvatar.textContent = user.name.charAt(0);
    chatName.textContent = user.name;
    //chatStatus.textContent = "Online";
    chatStatus.textContent = user.online ? "Online" : "Offline";

    chatMessages.innerHTML = "";
    emptyState.style.display = "none";

    chatInput.style.display = "flex";
    messageInput.focus();

    // 🔥 Load messages from backend
    try {
      const res = await fetch(`https://chat-app-backend-spb6.onrender.com/api/messages/${user.id}`, {
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });
      const data = await res.json();

      data.forEach(msg => {
        addMessageToUI(msg.sender === currentUser.id, msg.content, msg.createdAt, msg.read);
      });
    } catch (err) {
      console.error("Failed to load messages:", err);
    }
    // 🔥 Mark as read
    socket.emit("markRead", {
      senderId: user.id,
      receiverId: currentUser.id
    });
    }

  
    function loadProfile() {
      const user = JSON.parse(localStorage.getItem("user"));
      const avatarEl = document.getElementById("profileAvatar");

      if (user.avatar) {
        avatarEl.innerHTML = `<img src="https://chat-app-backend-spb6.onrender.com/uploads/${user.avatar}" />`;
      } else {
        avatarEl.textContent = user.username.charAt(0);
      }
    }

    const profileAvatar = document.getElementById("profileAvatar");
    const dropdown = document.getElementById("dropdown");

    profileAvatar.addEventListener("click", () => {
      dropdown.classList.toggle("show");
    });

    document.addEventListener("click", (e) => {
      if (!profileAvatar.contains(e.target)) {
        dropdown.classList.remove("show");
      }
    });


    const avatarInput = document.getElementById("avatarInput");

    document.getElementById("changeAvatar").onclick = () => {
      avatarInput.click();
    };

    avatarInput.addEventListener("change", async () => {
      const file = avatarInput.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append("avatar", file);

      const res = await fetch("https://chat-app-backend-spb6.onrender.com/api/users/avatar", {
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`
        },
        body: formData
      });

      const data = await res.json();

      localStorage.setItem("user", JSON.stringify(data));
      loadProfile();
    });


    document.getElementById("removeAvatar").onclick = async () => {
      await fetch("https://chat-app-backend-spb6.onrender.com/api/users/avatar", {
        method: "DELETE",
        headers: {
          Authorization: `Bearer ${token}`
        }
      });

      const user = JSON.parse(localStorage.getItem("user"));
      user.avatar = "";
      localStorage.setItem("user", JSON.stringify(user));

      loadProfile();
    };


    document.getElementById("logoutBtn").onclick = () => {
      localStorage.removeItem("token");
      localStorage.removeItem("user");

      window.location.href = "login.html";
    };


    function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || !selectedUser) return;

    const msg = {
      senderId: currentUser.id,
      receiverId: selectedUser.id,
      content: text
    };

    socket.emit("sendMessage", msg);
    messageInput.value = "";
    }



    socket.on("receiveMessage", (msg) => {
      const otherUserId =
        msg.sender === currentUser.id ? msg.receiver : msg.sender;

      if (selectedUser && selectedUser.id === otherUserId) {
        addMessageToUI(msg.sender === currentUser.id, msg.content, msg.createdAt);
      }
    });


    socket.on("onlineUsers", (onlineUserIds) => {
    users.forEach(user => {
    user.online = onlineUserIds.includes(user.id);
    });
      renderUserList(); // re-render with updated status
      if (selectedUser) {
        const updated = users.find(u => u.id === selectedUser.id);
        if (updated) {
          selectedUser.online = updated.online;
          chatStatus.textContent = updated.online ? "Online" : "Offline";
        }
      }
    });


    socket.on("typing", ({ senderId }) => {
      if (selectedUser && selectedUser.id === senderId) {
        showTypingIndicator();
      }
    });

    socket.on("stopTyping", ({ senderId }) => {
      if (selectedUser && selectedUser.id === senderId) {
        hideTypingIndicator();
      }
    });

    socket.on("messagesRead", ({ by }) => {
      if (selectedUser && selectedUser.id === by) {
        updateReadStatusUI();
      }
    });

  
    // function addMessageToUI(isSent, text, timestamp = new Date()) {
    //   const div = document.createElement("div");
    //   div.className = `message ${isSent ? "sent" : "received"}`;

    //   const time = new Date(timestamp).toLocaleTimeString([], {
    //     hour: "2-digit",
    //     minute: "2-digit"
    //   });

    //   div.innerHTML = `
    //     <div class="message-text">${text}</div>
    //     <div class="message-time">${time}</div>
    //   `;

    //   chatMessages.appendChild(div);
    //   chatMessages.scrollTop = chatMessages.scrollHeight;
    // }

    function addMessageToUI(isSent, text, timestamp = new Date(), isRead = false) {
      const div = document.createElement("div");
      div.className = `message ${isSent ? "sent" : "received"}`;

      const time = new Date(timestamp).toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });

      div.innerHTML = `
        <div class="message-text">${text}</div>
        <div class="message-meta">
          <span class="time">${time}</span>
          ${isSent ? `<span class="status">${isRead ? "✓✓" : "✓"}</span>` : ""}
        </div>
      `;

      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
  
    function setupEvents() {
      sendBtn.addEventListener("click", sendMessage);
      // messageInput.addEventListener("keydown", (e) => {
      //   if (e.key === "Enter") sendMessage();
      // });
      messageInput.addEventListener("input", () => {
        if (!selectedUser) return;

        // Send typing event
        socket.emit("typing", {
          senderId: currentUser.id,
          receiverId: selectedUser.id
        });

        // Clear previous timeout
        clearTimeout(typingTimeout);

        // Stop typing after 1 second of inactivity
        typingTimeout = setTimeout(() => {
          socket.emit("stopTyping", {
            senderId: currentUser.id,
            receiverId: selectedUser.id
          });
        }, 1000);
      });

      themeToggle.addEventListener("click", toggleDarkMode);
  
      chatHeader.addEventListener("click", () => {
        if (window.innerWidth <= 768) {
          app.classList.remove("mobile-chat");
        }
      });
    }
  
    function toggleDarkMode() {
      const isDark = document.body.classList.toggle("dark");
      localStorage.setItem("theme", isDark ? "dark" : "light");
      updateThemeToggle(isDark);
    }
  
    function loadTheme() {
      const savedTheme = localStorage.getItem("theme");
      const isDark = savedTheme === "dark";
      if (isDark) document.body.classList.add("dark");
      updateThemeToggle(isDark);
    }
  
    function updateThemeToggle(isDark) {
      const sun = themeToggle.querySelector(".sun");
      const moon = themeToggle.querySelector(".moon");
  
      sun.style.opacity = isDark ? "0.3" : "1";
      moon.style.opacity = isDark ? "1" : "0.3";
    }

    function showTypingIndicator() {
      let indicator = document.getElementById("typingIndicator");

      if (!indicator) {
        indicator = document.createElement("div");
        indicator.id = "typingIndicator";
        indicator.className = "typing-indicator";
        indicator.textContent = `${selectedUser.name} is typing...`;

        chatMessages.appendChild(indicator);
      }
    }

    function hideTypingIndicator() {
      const indicator = document.getElementById("typingIndicator");
      if (indicator) indicator.remove();
    }

    function updateReadStatusUI() {
      const sentMessages = document.querySelectorAll(".message.sent .status");

      sentMessages.forEach(status => {
        status.textContent = "✓✓";
      });
    }
  
    init();
  </script>
